  <style>
  /* === CSS RESET === */
  html,
  body,
  section,
  main,
  nav,
  footer,
  div,
  span,
  h1,
  h2,
  p,
  a,
  img,
  ul,
  li
  {
    margin: 0;
    padding: 0;
    border: 0;
    outline: 0;
    font-size: 100%;
    vertical-align: baseline;
    background: transparent;
  }
  body {
    background-color: #000;
    height: 100%;
    line-height: 1;
  }

  /* === TYPOGRAPHY === */
  .back,
  .btn{
    font-family: 'Inter', sans-serif;
    text-decoration: none;
    font-size: 23px;
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
  }

  .bottom {
    position: fixed;
    width: 100%;
    left: 50%;
    transform: translateX(-50%);
    height: 60px;
    background-color: #000;
    box-shadow: 0 0 1px #000, 0 0 3px #000, 0 0 7px #000, 0 0 10px #000;  }

  .bottom {
    bottom: 0;
    outline: #000 3px;
  }
  /* === MENU COMPONENTS === */
  .back{
    position: absolute;
    display: block;
    margin-top: 20px;
    width: 100dvw;
    text-align: center;
  }

  .c,
  .lang{
    z-index: 1;
    position: fixed;
    display: flex;
    top:auto;
  }
  .c{
    bottom:3px;
    left: auto;
    right: 5px;
  }
  .c span{
    font-family: sans-serif;
    font-weight: 300;
    font-size: 8px;
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
  }
  .lang {
    bottom: 30px;
    left: 15px;
  }
/*_____PAGE CONTENT____*/
main{
  position: absolute;
  display: block;
  margin-top: 60px;
  left:50%;
  transform: translateX(-50%);
  width:calc(100dvw - 30px);

}
  h1{
    font-weight: normal;
  }
  .films{
    position: relative;

  }
  .title{

  }
  /* === VIDEO FACADE STYLING === */
    .video-facade {
      position: relative;
      width: 100%;
      max-width: 560px; /* Matches your original size */
      aspect-ratio: 16 / 9;
      background-color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .video-facade .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }

    .video-facade:hover .thumb {
      opacity: 0.8;
    }

    /* Custom Play Button Overlay */
    .play-button {
      position: absolute;
      width: 68px;
      height: 48px;
      background-color: rgba(255, 0, 0, 0.9);
      border-radius: 12%;
      transition: transform 0.2s ease;
    }

    .play-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      border-style: solid;
      border-width: 10px 0 10px 20px;
      border-color: transparent transparent transparent #fff;
    }

    .video-facade:hover .play-button {
      transform: scale(1.1);
      background-color: #ff0000;
    }

    iframe {
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
    }
  </style>
  <link rel="stylesheet" href="./style.css" media="print" onload="this.media='all'">
</head>
<body>
  <header>
    <h1 class="back">Pedro Marques Pereira</h1>
  </header>
  <main>
  <div class="films">
    <h2 class="title">ebb</h2>
    <div id="youtube-facade" class="video-facade" onclick="loadVideo()">
      <img src="https://img.youtube.com/vi/NCiAU51CbV0/maxresdefault.jpg" alt="Video Thumbnail" class="thumb">
      <div class="play-button"></div>
    </div>
  </div>
</main>
  <footer class="bottom">
      <div class="lang"><a href="./about/pt" lang="pt" class="btn">pt</a></div>
      <div class="c"><span>© Pedro Marques Pereira 2025</span></div>
  </footer>
  <script>
  function loadVideo() {
      const container = document.getElementById('youtube-facade');
      // Replace the div content with the actual iframe
      container.innerHTML = `
        <iframe
          src="https://www.youtube-nocookie.com/embed/NCiAU51CbV0?autoplay=1"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>`;
      // Remove the click event so it doesn't try to reload
      container.onclick = null;
    }
</script>
</body>
