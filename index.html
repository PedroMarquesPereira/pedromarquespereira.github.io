<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://pedromarquespereira.com/">
    <meta name="google-site-verification" content="Jexe25yZrqi_kKhEpiRcIGP85mnKzrqiQqF0oZaJYYA" />
    <meta name="description" content="Still and Moving Image">
    <meta property="og:description" content="Still and Moving Image" />
    <meta property="og:title" content="Pedro Marques Pereira" />
    <meta property="og:url" content="https://pedromarquespereira.com/" />
    <meta property="og:image" content="https://pedromarquespereira.com/img/homepage/cover_homepage.webp"/>
    <meta property="og:type" content="website"/>
    <meta name="keywords" content="Pedro Marques Pereira, artist, photography, video, cinema, filmmaker, moving image, portfolio">
    <title>Pedro Marques Pereira</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" as="style" onload="this.rel='stylesheet'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    </noscript>
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="preload" as="image" href="./img/homepage/cover_homepage.webp" fetchpriority="high">
    <link rel="alternate" hreflang="en" href="https://pedromarquespereira.com/" />
    <link rel="alternate" hreflang="pt" href="https://pedromarquespereira.com/pt" />
    <link rel="alternate" hreflang="x-default" href="https://pedromarquespereira.com/" />
    <style>
    html,
    body,
    div,
    a,
    ul,
    li,
    h1
    {
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      font-size: 100%;
      vertical-align: baseline;
      background: transparent;
      overflow: hidden;
    }
    body {
      background-color: #000;
      height: 100%;
      line-height: 1;
    }
    .fade {
      opacity: 0;
      animation: fadein 0.3s ease-in forwards;
    }
    @keyframes fadein {
      to {
        opacity: 1;
        }
      }
    .vdo-cont{
      z-index: 0;
      position: relative;
      height:100dvh;
      width:100dvw;
    }
    .poster-img {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .vdo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
      display: block;
      background-position: left center;
    }
    .menu{
      z-index: 1;
      position: fixed;
      top:50%;
      transform: translateY(-50%);
      left: 15px;
      display: flex;
    }
    .menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .lang,
    .c{
      z-index: 1;
      position: fixed;
      top:auto;
      display: flex;
    }
    .lang{
      bottom:30px;
      left: 15px;
    }
    .c{
      bottom:3px;
      left: auto;
      right: 5px;
    }
    .c span{
      font-family: sans-serif;
      font-weight: 300;
      font-size: 8px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    }
    .btn{
      font-family: 'inter', sans-serif;
      text-decoration: none;
      font-size: 23px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    }
    </style>
    <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'">
  </head>
  <body class="fade">
    <header>
      <nav class="menu">
      <ul>
        <li><a href="./about" class="btn">about</a></li>
        <li><a href="./work" class="btn">work</a></li>
        <li><a href="./contact" class="btn">contact</a></li>
        <li><a href="https://www.instagram.com/pedro.marques.pereira/" target="_blank" rel="noopener noreferrer" class="btn">social</a></li>
      </ul>
      </nav>
    </header>
    <main>
      <div class="vdo-cont">
        <img class="vdo poster-img" src="./img/homepage/cover_homepage.webp" alt="" fetchpriority="high">
        <video class="vdo" autoplay muted loop playsinline preload="auto" fetchpriority="high" oncanplay="this.previousElementSibling.style.display='none'">
          <source src="./img/homepage/homepage.mp4" type="video/mp4">
        </video>
      </div>
    </main>
    <footer>
      <div class="lang"><a href="./pt" lang="pt" class="btn">pt</a></div>
      <div class="c"><span>© Pedro Marques Pereira 2026</span></div>
    </footer>
  </body>
</html>
