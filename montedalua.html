<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="O Monte da Lua">
    <meta property="og:image" content="https://pedromarquespereira.com/img/montedalua/1.webp"/>
    <meta property="og:type" content="website"/>
    <title>O Monte da Lua</title>
    <noscript>
    </noscript>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="preload" as="image" href="./img/montedalua/1.webp" fetchpriority="high">
    <style>
    html,
    body,
    div,
    a,
    ul,
    li,
    h1
    {
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      font-size: 100%;
      vertical-align: baseline;
      background: transparent;
    }
    html {
      overflow-x: hidden;
    }
    body {
      background-color: #000;
      height: 100%;
      line-height: 1;
      overflow-x: hidden;
    }
    /*title*/
    .title{
      position: fixed;
      z-index: 2;
      top: 20px;
      left: auto;
      right: 15px;
      max-width: calc(100dvw - 30px);
      font-family: 'Inter', sans-serif;
      pointer-events: none;
    }
    h1{
      font-size: 20px;
      font-weight: 500;
      color:#fff;
    }
    /*video*/
    .videos{
      z-index: 1;
      position: fixed;
      display: flex;
      flex-direction: row;
      top: 0;
      left: 0;
      width: 100dvw;
      height: 100dvh;
      align-items: flex-end;
      padding-bottom: 170px;
      overflow-x: auto;
      gap: 15px;
      padding-left: 15px;
      padding-right: 15px;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .videos::-webkit-scrollbar {
      display: none;
    }
    video {
      width: calc(100dvw - 30px);
      flex-shrink: 0;
    }
    /*fades*/
    .fade {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 15px;
      z-index: 3;
      pointer-events: none;
    }
    .fade-left {
      left: 0;
      background: linear-gradient(to right, #000 10px, transparent 14px);
    }
    .fade-right {
      right: 0;
      background: linear-gradient(to left, #000 10px, transparent 14px);
    }
/*desktop*/
    @media (min-width: 980px) {
      .title{
        z-index: 100;
      }
      .videos {
      flex-direction: column;
      bottom: 26px;
      top: auto;
      left: auto;
      right: 0;
      width: min(60dvw, calc((100dvh - 41px) * 4 / 3));
      height: min(calc(45dvw + 15px), calc(100dvh - 26px));
      overflow-x: hidden;
      overflow-y: auto;
      padding-bottom: 15px;
      gap: 15px;
      }
      video {
      width: min(60dvw, calc((100dvh - 41px) * 4 / 3));
      flex-shrink: 0;
      }
      .fade-left {
      bottom: min(calc(26px + 45dvw), calc(100dvh - 15px));
      top: auto;
      left: auto;
      right: 15px;
      width: min(60dvw, calc((100dvh - 41px) * 4 / 3));
      height: 15px;
      background: linear-gradient(to bottom, #000 10px, transparent 14px);
      }
      .fade-right {
      bottom: 26px;
      top: auto;
      left: auto;
      right: 15px;
      width: min(60dvw, calc((100dvh - 41px) * 4 / 3));
      height: 15px;
      background: linear-gradient(to top, #000 10px, transparent 14px);
      }
    }
    /* texto*/
    footer{
      position: fixed;
      display: flex;
      align-items: flex-end;
      height: 100vh;
      left: 15px;
      width: calc(100dvw - 30px);
      pointer-events: none;
    }
    .texto{
      position: fixed;
      bottom: 20px;
      left: 15px;
      font-family: sans-serif;
      font-size: 14px;
      line-height: 25px;
      color: #fff;
      z-index: 2;
      pointer-events: none;
    }
    </style>
    <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'">
  </head>
  <body>
    <header>
      <div class="title">
        <h1>O Monte da Lua</h1>
      </div>
    </header>
    <main>
      <div class="fade fade-left"></div>
      <div class="fade fade-right"></div>
      <div class="videos">
        <video class="tela" src="./img/montedalua/2.mp4" autoplay loop muted poster="./img/montedalua/2.webp"></video>
        <video class="tela" src="./img/montedalua/3.mp4" autoplay loop muted poster="./img/montedalua/3.webp"></video>
        <video class="tela" src="./img/montedalua/1.mp4" autoplay loop muted poster="./img/montedalua/1.webp"></video>
      </div>
    </main>
    <footer>
      <div class="texto">
        <p><i>vi uma luz, <br>saltava entre os ramos das árvores,<br>e corria para lá das nuvens,<br>parecia-se mexer com o tempo e quase que a perdi (...)</i></p>
      </div>
    </footer>
  </body>
</html>
